name: 'Gitlab CI'
description: 'Mirror repository to a Gitlab remote and check CI pipeline status'

inputs:
  # Mandatory arguments
  domain:
    description: 'Domain of remote Gitlab instance'
    required: true
  repo:
    description: 'Full group path of mirror repository'
    required: true
  token:
    description: 'Access token for mirror repository'
    required: true
  # Optional arguments (sensible defaults below)
  api-version:
    description: 'Version of Gitlab API to use'
    required: true
    default: "v4"
  retry-count:
    description: 'Number of polls before pipeline spawn is deemed a failure'
    required: true
    default: 12
  retry-period:
    description: 'Period of polls in seconds before pipeline spawns'
    required: true
    default: 10
  poll-count:
    description: 'Number of polls before running pipeline is deemed a failure'
    required: true
    default: 720
  poll-period:
    description: 'Period of polls in seconds while pipeline is running'
    required: true
    default: 10
  expose-error-logs:
    description: 'Fetch and surface failed job traces in the Actions log on failure (opt-in; disable if traces contain sensitive information)'
    required: false
    default: 'false'
  trace-tail-lines:
    description: 'Number of lines to show from the end of each failed job trace'
    required: false
    default: 200

runs:
  using: "composite"
  steps:
    - name: Full checkout
      shell: bash
      run: git clone --bare https://token:${{ github.token }}@github.com/${{ github.repository }} ${{ github.workspace }}
    - name: Push to mirror
      shell: bash
      run: |
        git remote add gitlab https://token:${{ inputs.token }}@${{ inputs.domain }}/${{ inputs.repo }}
        git push --mirror gitlab
    - name: Install uv
      uses: astral-sh/setup-uv@v8.2.0
      with:
        version: "0.10"
        python-version: 3.12
        enable-cache: false
    - name: Poll results
      shell: bash
      # Pull request SHAs point to a merged commit that is not mirrored
      run: |
        export SHA=${{ github.sha }}
        if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then export SHA=${{ github.event.pull_request.head.sha }}; fi
        uv run --with requests ${{ github.action_path }}/gitlab-ci.py $SHA ${{ inputs.token }} ${{ inputs.domain }} ${{ inputs.repo }} ${{ inputs.api-version }} ${{ inputs.retry-count }} ${{ inputs.retry-period }} ${{ inputs.poll-count }} ${{ inputs.poll-period }}
    - name: Surface and print GitLab CI error logs on failure
      if: failure() && inputs.expose-error-logs == 'true'
      shell: bash
      env:
        GITLAB_TOKEN: ${{ inputs.token }}
        GITLAB_DOMAIN: ${{ inputs.domain }}
        GITLAB_REPO: ${{ inputs.repo }}
        API_VERSION: ${{ inputs.api-version }}
        COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        OUT_DIR: gitlab-logs
      run: |
        bash ${{ github.action_path }}/fetch_gitlab_logs.sh
        shopt -s nullglob
        for trace in "$OUT_DIR"/*.trace; do
          job=$(basename "$trace" .trace)
          echo "::group:: FAILED: ${job}"
          # Trace content is untrusted; disable Actions workflow-command parsing so
          # lines like "::error::" in the trace are printed literally, not executed.
          # The random token prevents the trace from re-enabling parsing early.
          tok=$(uuidgen)
          echo "::stop-commands::${tok}"
          tail -n ${{ inputs.trace-tail-lines }} "$trace"
          echo "::${tok}::"
          echo "::endgroup::"
        done
