name: 'RISC-V GCC install'
description: 'Installs a nightly build of the RISC-V GCC toolchain.'

inputs:
  # Optional arguments (sensible defaults below)
  nightly-date:
    description: 'Date of nightly release (default: 2023.03.14)'
    required: true
    default: '2023.03.14'
  distro:
    description: 'Identifier of distribution (default: ubuntu-22.04)'
    required: true
    default: 'ubuntu-22.04'
  target:
    description: 'Target architecture and platform (default: riscv64-elf)'
    required: true
    default: 'riscv64-elf'

runs:
  using: "composite"
  steps:
    - name: Install RISC-V GCC toolchain
      shell: bash
      run: |
        set -euo pipefail

        RISCV_GCC_PATH=${{ runner.temp }}/pulp-actions/riscv-gcc-install
        mkdir -p ${RISCV_GCC_PATH}
        cd ${RISCV_GCC_PATH}

        RELEASE_SELECTOR='${{ inputs.nightly-date }}'
        DISTRO='${{ inputs.distro }}'
        TARGET='${{ inputs.target }}'

        RISCV_GCC_NAME=riscv-gcc-${RELEASE_SELECTOR}-${DISTRO}-${TARGET}
        mkdir -p "${RISCV_GCC_NAME}"

        asset_candidates=(
          "https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/${RELEASE_SELECTOR}/${TARGET}-${DISTRO}-gcc.tar.xz"
          "https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/${RELEASE_SELECTOR}/${TARGET}-${DISTRO}-gcc-nightly-${RELEASE_SELECTOR}-nightly.tar.xz"
          "https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/${RELEASE_SELECTOR}/${TARGET}-${DISTRO}-nightly-${RELEASE_SELECTOR}-nightly.tar.gz"
        )

        ASSET_URL=
        ASSET_NAME=
        for candidate in "${asset_candidates[@]}"; do
          if curl -fsLI "${candidate}" > /dev/null; then
            ASSET_URL="${candidate}"
            ASSET_NAME="${candidate##*/}"
            break
          fi
        done

        if [ -z "${ASSET_URL}" ]; then
          echo "Could not find a matching RISC-V GCC asset for ${TARGET}/${DISTRO} and release ${RELEASE_SELECTOR}." >&2
          exit 1
        fi

        curl -fsSL -o "${ASSET_NAME}" "${ASSET_URL}"
        tar -C "${RISCV_GCC_NAME}" -xf "${ASSET_NAME}" --strip-components=1
        rm -f "${ASSET_NAME}"
        echo "PATH=$PATH:${RISCV_GCC_PATH}/${RISCV_GCC_NAME}/bin" >> ${GITHUB_ENV}
