name: 'slang'
description: 'Build project with slang and report errors and warnings.'

inputs:
   slang-flags:
      description: 'Flags to pass to slang. Must at least include the file list.'
      required: true
      default: ''

runs:
   using: 'composite'
   steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10"
          python-version: 3.12
          enable-cache: false

      - name: Run slang
        shell: bash
        run: uv run --with pyslang ${{ github.action_path }}/run_slang.py "${{ inputs.slang-flags }}" slang_diags.json

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run reviewdog
        shell: bash
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run ${{ github.action_path }}/slang_to_rdjson.py slang_diags.json \
            | reviewdog -f=rdjson \
                -name=slang \
                -reporter=github-check \
                -filter-mode=nofilter \
                -fail-level=error
