name: 'slang'
description: 'Build project with slang and report errors and warnings.'

inputs:
   token:
      description: 'GitHub token for reviewdog. Pass secrets.GITHUB_TOKEN from the calling workflow.'
      required: true
   slang-flags:
      description: 'Flags to pass to slang. Must at least include the file list.'
      required: true
      default: ''
   reviewdog-reporter:
      description: 'Reporter to use for reviewdog. Defaults to github-check.'
      required: false
      default: 'github-check'
   reviewdog-name:
      description: 'Name for the reviewdog reporter run. Must be unique per job run, otherwise multiple
         reporters (e.g., spawned by a matrix) may overwrite each others results. To avoid such collisions,
         the default behavior is to suffix the check_run_id (but other unique names can be chosen instead
         for better readibility)'
      required: false
      default: 'slang-${{ job.check_run_id }}'

runs:
   using: 'composite'
   steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10"
          python-version: 3.12
          enable-cache: false

      - name: Run slang
        shell: bash
        run: uv run --with pyslang ${{ github.action_path }}/run_slang.py "${{ inputs.slang-flags }}" slang_diags.json

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run reviewdog
        shell: bash
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.token }}
        run: |
          uv run ${{ github.action_path }}/slang_to_rdjson.py slang_diags.json \
            | reviewdog -f=rdjson \
                -name=${{ inputs.reviewdog-name }} \
                -reporter=${{ inputs.reviewdog-reporter }} \
                -filter-mode=nofilter \
                -fail-level=error
