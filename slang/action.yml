name: 'slang'
description: 'Build project with slang and report errors and warnings.'

inputs:
   token:
      description: 'GitHub token for reviewdog. Pass secrets.GITHUB_TOKEN from the calling workflow.'
      required: true
   slang-flags:
      description: 'Flags to pass to slang. Must at least include the file list.'
      required: true
      default: ''
   reviewdog-reporter:
      description: 'Reporter to use for reviewdog. Defaults to github-check.'
      required: false
      default: 'github-check'
   reviewdog-name:
      description: 'Name for the reviewdog check. Must be unique per job instance; otherwise multiple
         reporters (e.g., spawned by a matrix) may overwrite each others results. Defaults to slang.'
      required: false
      default: 'slang'
   pyslang-version:
      description: 'pyslang version to install, as an exact version number (e.g. "11.0.0").
         pyslang bundles the slang engine and is released in lockstep with it, so this single
         value pins both the pyslang and the slang version. Pinned to a known-good release for
         reproducible runs and to avoid surprise breakage from upstream API changes. run_slang.py
         currently supports pyslang v10 and v11; bump this only after verifying a newer release.'
      required: false
      default: '11.0.0'

runs:
   using: 'composite'
   steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          version: "0.10"
          python-version: 3.12
          enable-cache: false

      - name: Run slang
        shell: bash
        run: uv run --with "pyslang==${{ inputs.pyslang-version }}" ${{ github.action_path }}/run_slang.py "${{ inputs.slang-flags }}" slang_diags.json

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run reviewdog
        shell: bash
        continue-on-error: true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.token }}
        run: |
          uv run ${{ github.action_path }}/slang_to_rdjson.py slang_diags.json \
            | reviewdog -f=rdjson \
                -name=${{ inputs.reviewdog-name }} \
                -reporter=${{ inputs.reviewdog-reporter }} \
                -filter-mode=nofilter \
                -fail-level=error
